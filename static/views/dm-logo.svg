<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!--
    Discordmaxxer — bullet-hole take.
    Apple squircle chassis (same as OM), but in a discreet navy-indigo blend
    (Discord-derived, dramatically aged-up) instead of OM's loud magenta.
    Single focal subject: a white Discord-style circle with 4 bullet holes
    punched through, crack lines radiating from each. The brand promise
    rendered literally — Discord, perforated.
  -->
  <defs>
    <!-- Discreet blend: deepened Discord blurple → midnight. Keeps the
         brand lineage but feels premium / stealth instead of loud. -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#3a4178"/>
      <stop offset="35%"  stop-color="#2a3168"/>
      <stop offset="70%"  stop-color="#1a2150"/>
      <stop offset="100%" stop-color="#0d1338"/>
    </linearGradient>
    <!-- Apple top specular. -->
    <linearGradient id="hi" x1="50%" y1="0%" x2="50%" y2="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Bottom shade. -->
    <linearGradient id="bottomShade" x1="50%" y1="60%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.28"/>
    </linearGradient>
    <!-- White circle face — same dimensional gradient pattern as OM. -->
    <linearGradient id="faceFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e9ecf5"/>
    </linearGradient>
    <!-- Bullet hole gradient — dark ring, deeper center (lit from above). -->
    <radialGradient id="holeFill" cx="50%" cy="38%" r="55%">
      <stop offset="0%"   stop-color="#1a2150"/>
      <stop offset="60%"  stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <!-- Drop shadow under the face. -->
    <filter id="faceShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <!-- Inner shadow on holes (gives depth — "punched through"). -->
    <filter id="holeInner" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer transparent canvas. -->
  <rect width="1024" height="1024" fill="transparent"/>

  <!-- Apple squircle bg. -->
  <rect x="64" y="64" width="896" height="896" rx="220" ry="220" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="220" ry="220" fill="url(#hi)"/>
  <rect x="64" y="64" width="896" height="896" rx="220" ry="220" fill="url(#bottomShade)"/>
  <rect x="65" y="65" width="894" height="894" rx="219" ry="219"
        fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

  <!-- Speed accent lines, top-right (suite-canon). Slightly dimmer here for
       the discreet palette. -->
  <g stroke="#ffffff" stroke-opacity="0.16" stroke-linecap="round" fill="none">
    <line x1="772" y1="208" x2="868" y2="252" stroke-width="14"/>
    <line x1="792" y1="288" x2="864" y2="320" stroke-width="11"/>
    <line x1="810" y1="356" x2="858" y2="378" stroke-width="9"/>
  </g>

  <!-- ── THE FACE — Discord-style circle, white, drop-shadowed for lift. -->
  <g filter="url(#faceShadow)">
    <circle cx="512" cy="512" r="252" fill="url(#faceFill)"/>
  </g>

  <!-- ── BULLET HOLES — punched through the face, with crack lines.
       4 holes total: a centred "headshot" (largest), three off-center.
       Each hole = a dark gradient circle + jagged crack lines radiating
       in white-low-opacity (read as paint chips around the impact). -->

  <!-- Hole 1: upper-left, medium. -->
  <g>
    <circle cx="430" cy="414" r="22" fill="url(#holeFill)"/>
    <circle cx="430" cy="414" r="22" fill="none" stroke="#e9ecf5" stroke-opacity="0.4" stroke-width="2"/>
    <!-- crack lines -->
    <g stroke="#a0a8c0" stroke-opacity="0.55" stroke-linecap="round" fill="none">
      <line x1="430" y1="392" x2="416" y2="368" stroke-width="1.8"/>
      <line x1="430" y1="392" x2="442" y2="370" stroke-width="1.4"/>
      <line x1="408" y1="416" x2="378" y2="404" stroke-width="1.8"/>
      <line x1="452" y1="416" x2="478" y2="402" stroke-width="1.4"/>
      <line x1="430" y1="436" x2="426" y2="468" stroke-width="1.6"/>
    </g>
  </g>

  <!-- Hole 2: centred-right, LARGEST (the headshot). -->
  <g>
    <circle cx="582" cy="498" r="32" fill="url(#holeFill)"/>
    <circle cx="582" cy="498" r="32" fill="none" stroke="#e9ecf5" stroke-opacity="0.45" stroke-width="2.2"/>
    <g stroke="#a0a8c0" stroke-opacity="0.6" stroke-linecap="round" fill="none">
      <line x1="582" y1="466" x2="568" y2="430" stroke-width="2"/>
      <line x1="582" y1="466" x2="600" y2="424" stroke-width="2.2"/>
      <line x1="550" y1="498" x2="510" y2="488" stroke-width="2"/>
      <line x1="614" y1="498" x2="654" y2="490" stroke-width="2.2"/>
      <line x1="582" y1="530" x2="572" y2="572" stroke-width="2"/>
      <line x1="582" y1="530" x2="610" y2="568" stroke-width="1.6"/>
      <line x1="558" y1="476" x2="528" y2="450" stroke-width="1.4"/>
    </g>
  </g>

  <!-- Hole 3: lower-left. -->
  <g>
    <circle cx="468" cy="606" r="18" fill="url(#holeFill)"/>
    <circle cx="468" cy="606" r="18" fill="none" stroke="#e9ecf5" stroke-opacity="0.4" stroke-width="1.8"/>
    <g stroke="#a0a8c0" stroke-opacity="0.5" stroke-linecap="round" fill="none">
      <line x1="468" y1="588" x2="462" y2="566" stroke-width="1.4"/>
      <line x1="450" y1="608" x2="424" y2="604" stroke-width="1.4"/>
      <line x1="486" y1="608" x2="510" y2="618" stroke-width="1.4"/>
      <line x1="468" y1="624" x2="466" y2="650" stroke-width="1.4"/>
    </g>
  </g>

  <!-- Hole 4: lower-right, smallest. -->
  <g>
    <circle cx="630" cy="586" r="14" fill="url(#holeFill)"/>
    <circle cx="630" cy="586" r="14" fill="none" stroke="#e9ecf5" stroke-opacity="0.35" stroke-width="1.6"/>
    <g stroke="#a0a8c0" stroke-opacity="0.45" stroke-linecap="round" fill="none">
      <line x1="630" y1="572" x2="638" y2="554" stroke-width="1.2"/>
      <line x1="616" y1="586" x2="600" y2="582" stroke-width="1.2"/>
      <line x1="644" y1="586" x2="660" y2="592" stroke-width="1.2"/>
    </g>
  </g>
</svg>
