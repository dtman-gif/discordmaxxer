name: Test PAT (manual)

# One-off / on-demand workflow that fires a no-op repository_dispatch
# at MaxxTopia/maxxtopia using the MAXXTOPIA_DISPATCH_PAT secret.
# A 204 from GitHub's API means the PAT works; any 4xx means it doesn't.
# Doesn't fire any listener (event_type doesn't match any registered
# listener), so it's safe to run anytime.

on:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Test cross-repo dispatch with current PAT
              env:
                  PAT: ${{ secrets.MAXXTOPIA_DISPATCH_PAT }}
                  HAS_PAT: ${{ secrets.MAXXTOPIA_DISPATCH_PAT != '' }}
              run: |
                  if [ "$HAS_PAT" != "true" ]; then
                      echo "::error::MAXXTOPIA_DISPATCH_PAT is not set on this repo"
                      exit 1
                  fi
                  echo "Firing no-op dispatch at MaxxTopia/maxxtopia…"
                  HTTP_CODE=$(curl -s -o /tmp/resp -w "%{http_code}" -X POST \
                       -H "Accept: application/vnd.github+json" \
                       -H "Authorization: Bearer ${PAT}" \
                       -H "X-GitHub-Api-Version: 2022-11-28" \
                       https://api.github.com/repos/MaxxTopia/maxxtopia/dispatches \
                       -d '{"event_type":"test-pat-noop","client_payload":{}}')
                  echo "HTTP $HTTP_CODE"
                  cat /tmp/resp || true
                  if [ "$HTTP_CODE" = "204" ]; then
                      echo "::notice::PAT works — dispatch returned 204"
                      exit 0
                  fi
                  echo "::error::PAT failed — HTTP $HTTP_CODE"
                  exit 1
