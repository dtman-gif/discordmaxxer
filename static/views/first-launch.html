<!doctype html>
<meta charset="utf-8" />

<head>
    <title>Discordmaxxer Setup</title>

    <link rel="stylesheet" href="./common.css" type="text/css" />

    <style>
        body {
            height: 100vh;

            padding: 1.5em;
            padding-bottom: 1em;

            border: 1px solid var(--fg-semi-trans);
            border-top: none;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        select {
            background: var(--bg);
            color: var(--fg);
            padding: 0.3em;
            margin: -0.3em;
            border-radius: 6px;
        }

        h1 {
            margin: 0.4em 0 0;
        }

        p {
            margin: 1em 0 2em;
        }

        form {
            display: grid;
            gap: 1em;
            margin: 0;
        }

        label {
            position: relative;
            display: flex;
            justify-content: space-between;
        }

        label:has(input[type="checkbox"]),
        select {
            cursor: pointer;
        }

        label:not(:last-child)::after {
            content: "";
            position: absolute;
            bottom: -10px;
            width: 100%;
            height: 1px;
            background-color: var(--fg-secondary);
            opacity: 0.5;
        }

        label div {
            display: grid;
            gap: 0.2em;
        }

        label h2 {
            margin: 0;
            font-weight: normal;
            font-size: 1.1rem;
            line-height: 1rem;
        }

        label span {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--fg-secondary);
        }

        #buttons {
            display: flex;
            justify-content: end;
            gap: 0.5em;
            margin-top: auto;
        }

        button {
            padding: 0.6em 1.2em;
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.15s, box-shadow 0.15s, border-color 0.15s;
        }

        button:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-glow);
            box-shadow: var(--shadow-glow);
        }

        #submit {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-color: var(--accent-primary);
            color: var(--text-primary);
            font-weight: 600;
        }

        #submit:hover {
            box-shadow: 0 0 24px var(--border-glow);
        }

        .dm-launch-mark {
            width: 88px;
            height: 88px;
            border-radius: 22px;
            background: linear-gradient(135deg, #f37bff 0%, #e25bff 35%, #7d51f7 70%, #4c51f7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.6em;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.2) inset, 0 8px 24px rgba(226,91,255,0.4);
        }
        .dm-launch-mark::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(255,255,255,0.32) 0%, rgba(255,255,255,0) 55%);
            pointer-events: none;
        }
        .dm-launch-mark svg {
            width: 56px; height: 56px;
            filter: drop-shadow(0 3px 6px rgba(26,0,40,0.4));
            position: relative; z-index: 1;
        }

        /* Random launch effects (matched to splash.html) */
        .effect-pulse .dm-launch-mark { animation: dml-pulse 1.6s ease-in-out infinite; }
        @keyframes dml-pulse {
            0%, 100% { transform: scale(1); }
            50%      { transform: scale(1.04); box-shadow: 0 0 0 1px rgba(255,255,255,0.3) inset, 0 12px 32px rgba(226,91,255,0.55); }
        }
        .effect-gradient .dm-launch-mark { background-size: 200% 200%; animation: dml-grad 3s ease-in-out infinite; }
        @keyframes dml-grad {
            0%, 100% { background-position: 0% 0%; }
            50%      { background-position: 100% 100%; }
        }
        .effect-spin .dm-launch-mark svg {
            animation: dml-spin-in 0.7s cubic-bezier(0.2, 1.4, 0.4, 1) 0s 1, dml-spin-loop 10s linear 0.7s infinite;
        }
        @keyframes dml-spin-in { 0% { transform: rotate(-180deg) scale(0.5); opacity: 0; } 100% { transform: rotate(0) scale(1); opacity: 1; } }
        @keyframes dml-spin-loop { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }
        .effect-flash .dm-launch-mark { animation: dml-flash 0.6s cubic-bezier(0.2, 1.6, 0.4, 1) 0s 1 forwards; }
        @keyframes dml-flash {
            0%   { opacity: 0; transform: scale(0.3); }
            60%  { opacity: 1; transform: scale(1.12); }
            100% { opacity: 1; transform: scale(1); }
        }
        .effect-chidori .dm-launch-mark { animation: dml-chidori 1.6s ease-in-out infinite; }
        @keyframes dml-chidori {
            0%, 100% { box-shadow: 0 0 0 1px rgba(255,255,255,0.2) inset, 0 0 16px rgba(76,81,247,0.5); }
            50%      { box-shadow: 0 0 0 1px rgba(255,255,255,0.5) inset, 0 0 48px rgba(76,81,247,1), 0 0 80px rgba(226,91,255,0.6); }
        }
    </style>
</head>

<body id="launch-body">
    <div class="dm-launch-mark">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 5 L8 13 L11.5 13 L9.5 19 L16 11 L12.5 11 Z" fill="#ffffff" stroke="#fbe8ff" stroke-width="0.3"/>
        </svg>
    </div>
    <h1>Welcome to Discordmaxxer</h1>
    <p>Discord, optimized. Let's set up the basics.</p>

    <form>
        <label>
            <h2>Discord Branch</h2>
            <select name="discordBranch">
                <option value="stable">stable</option>
                <option value="canary">canary</option>
                <option value="ptb">ptb</option>
            </select>
        </label>

        <label>
            <div>
                <h2>Start with System</h2>
                <span>Automatically open Discordmaxxer when your computer starts</span>
            </div>
            <input type="checkbox" name="autoStart" />
        </label>

        <label>
            <div>
                <h2>Rich Presence</h2>
                <span>Show what game you're playing in Discord (disabled by Tournament Mode)</span>
            </div>
            <input type="checkbox" name="richPresence" checked />
        </label>

        <label>
            <div>
                <h2>Import Existing Settings</h2>
                <span>If a previous client install is found, import its plugin choices</span>
            </div>
            <input type="checkbox" name="importSettings" checked />
        </label>

        <label>
            <div>
                <h2>Minimise to Tray</h2>
                <span>Minimise to Tray when closing</span>
            </div>
            <input type="checkbox" name="minimizeToTray" checked />
        </label>

        <label>
            <div>
                <h2>Skip First-Load Tips</h2>
                <span>Don't show tooltips on first load. Recommended off if this is your first time using Discordmaxxer.</span>
            </div>
            <input type="checkbox" name="skipTips" />
        </label>
    </form>
    <div id="buttons">
        <button id="cancel">Quit</button>
        <button id="submit">Submit</button>
    </div>
</body>

<script>
    const EFFECTS = ["pulse", "gradient", "spin", "flash", "chidori"];
    const pick = EFFECTS[Math.floor(Math.random() * EFFECTS.length)];
    document.getElementById("launch-body").classList.add("effect-" + pick);

    cancel.onclick = () => console.info("cancel");
    submit.onclick = e => {
        const form = document.querySelector("form");
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        console.info("form:" + JSON.stringify(data));
        e.preventDefault();
    };
</script>
