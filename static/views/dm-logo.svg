<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!--
    The Strip — Pentagram-final.
    Hybrid B-dominant: universal messenger silhouette with structural
    bracket frame (v2), restored blurple body (v1), one confident gold
    [++] inside the bubble, ablation cut destroying the right bracket's
    top half, 3 dimensional wedges + 8 particle squares along unified
    +28° vector. The mark is a fork of Discord that got hit by something
    faster than it.
  -->
  <defs>
    <!-- Bubble body — restored Discord-blurple, slightly deepened. -->
    <radialGradient id="m" cx="43%" cy="40%" r="78%">
      <stop offset="0%"   stop-color="#8E9AFF"/>
      <stop offset="45%"  stop-color="#5865F2"/>
      <stop offset="85%"  stop-color="#3B46D4"/>
      <stop offset="100%" stop-color="#2A33B0"/>
    </radialGradient>
    <!-- White specular highlight — top half, 28% opacity. -->
    <linearGradient id="hi" x1="50%" y1="0%" x2="50%" y2="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Inner bottom shade — 22% black, soft feather. -->
    <linearGradient id="sh" x1="50%" y1="70%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.22"/>
    </linearGradient>
    <!-- Cut plasma — aqua tri-stop. -->
    <linearGradient id="aq" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#BFF7FF"/>
      <stop offset="50%"  stop-color="#55FFFF"/>
      <stop offset="100%" stop-color="#16D6E6"/>
    </linearGradient>
    <!-- Gold for brackets + ++ glyph. -->
    <linearGradient id="g" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#FFAA00"/>
      <stop offset="100%" stop-color="#D98B00"/>
    </linearGradient>
    <!-- Wedge gradient — lit edge faces cut, dark trails. -->
    <linearGradient id="wd" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#A3AEFF"/>
      <stop offset="100%" stop-color="#2A33B0"/>
    </linearGradient>

    <!-- Drop shadow under bubble. -->
    <filter id="bsh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <!-- Cut + bracket glow. -->
    <filter id="gl" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Wedge glow. -->
    <filter id="gl2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Bubble silhouette — universal messenger. -->
    <clipPath id="bclip">
      <path d="M 144 170
               H 784 a96 96 0 0 1 96 96
               V 610 a96 96 0 0 1 -96 96
               H 324
               L 260 880
               L 260 706
               H 240 a96 96 0 0 1 -96 -96
               V 266 a96 96 0 0 1 96 -96 Z"/>
    </clipPath>
    <!-- Cut clip — used to ablate right bracket's top half. -->
    <clipPath id="cutClip">
      <path d="M 0 380 L 1024 380 L 1024 1024 L 0 1024 Z"/>
    </clipPath>
  </defs>

  <!-- Stage. -->
  <rect width="1024" height="1024" fill="#0A0E1A"/>

  <!-- Suite-canon corner ticks — aqua top-left, gold bottom-right. -->
  <line x1="64"  y1="64"  x2="220" y2="64"  stroke="url(#aq)" stroke-opacity="0.35" stroke-width="3"/>
  <line x1="64"  y1="64"  x2="64"  y2="220" stroke="url(#aq)" stroke-opacity="0.35" stroke-width="3"/>
  <line x1="960" y1="960" x2="804" y2="960" stroke="url(#g)"  stroke-opacity="0.35" stroke-width="3"/>
  <line x1="960" y1="960" x2="960" y2="804" stroke="url(#g)"  stroke-opacity="0.35" stroke-width="3"/>

  <!-- ── Particles — 8 squares only (down from 14), unified +28° vector
       from (760, 240) toward (1040, -40). Opacity decay 0.85 → 0.15. -->
  <g fill="#55FFFF">
    <rect x="780" y="232" width="7" height="7" rx="0.5" opacity="0.85"/>
    <rect x="824" y="200" width="6" height="6" opacity="0.72"/>
    <rect x="864" y="170" width="5" height="5" opacity="0.60"/>
    <rect x="902" y="142" width="5" height="5" opacity="0.48"/>
    <rect x="938" y="116" width="4" height="4" opacity="0.36"/>
    <rect x="970" y="92"  width="4" height="4" opacity="0.26"/>
    <rect x="998" y="70"  width="3" height="3" opacity="0.18"/>
    <rect x="1018" y="50" width="3" height="3" opacity="0.12"/>
  </g>

  <!-- ── Wedge C — smallest, furthest. -->
  <g transform="rotate(-22 980 55)" filter="url(#gl2)">
    <polygon points="940,20 1020,0 1024,90 970,110" fill="url(#wd)" opacity="0.55"/>
    <line x1="940" y1="20" x2="970" y2="110" stroke="#55FFFF" stroke-opacity="0.70" stroke-width="1.5"/>
  </g>

  <!-- ── Wedge B — medium, drifting up-right. -->
  <g transform="rotate(-14 900 130) translate(24 -16)" filter="url(#gl2)">
    <polygon points="820,90 980,60 1000,170 860,200" fill="url(#wd)" opacity="0.78"/>
    <line x1="820" y1="90" x2="860" y2="200" stroke="#55FFFF" stroke-opacity="0.75" stroke-width="1.8"/>
  </g>

  <!-- ── Wedge A — largest, closest to the cut. -->
  <g transform="rotate(-8 810 235)" filter="url(#gl2)">
    <polygon points="700,180 880,140 920,260 740,290" fill="url(#wd)"/>
    <line x1="700" y1="180" x2="740" y2="290" stroke="#55FFFF" stroke-opacity="0.85" stroke-width="2.2"/>
  </g>

  <!-- ── BUBBLE BODY (universal messenger silhouette, blurple-restored). -->
  <g filter="url(#bsh)">
    <path d="M 144 170
             H 784 a96 96 0 0 1 96 96
             V 610 a96 96 0 0 1 -96 96
             H 324
             L 260 880
             L 260 706
             H 240 a96 96 0 0 1 -96 -96
             V 266 a96 96 0 0 1 96 -96 Z"
          fill="url(#m)"/>
  </g>
  <g clip-path="url(#bclip)">
    <rect x="0" y="0" width="1024" height="450" fill="url(#hi)"/>
    <rect x="0" y="500" width="1024" height="500" fill="url(#sh)"/>
  </g>

  <!-- ── Diagonal cut — bubble top through right-bracket area. -->
  <g filter="url(#gl)">
    <line x1="700" y1="220" x2="1000" y2="380"
          stroke="url(#aq)" stroke-width="20" stroke-linecap="round"/>
  </g>
  <line x1="700" y1="220" x2="1000" y2="380"
        stroke="#E8FFFF" stroke-width="4" stroke-linecap="round" stroke-opacity="0.92"/>

  <!-- ── LEFT BRACKET [ — structural frame, no glow (clean read). -->
  <g fill="url(#g)">
    <rect x="92" y="180" width="32" height="640"/>
    <rect x="92" y="180" width="64" height="40"/>
    <rect x="92" y="780" width="64" height="40"/>
  </g>

  <!-- ── RIGHT BRACKET ] — mirrored, ablated below y=380 by the cut. -->
  <g clip-path="url(#cutClip)" fill="url(#g)">
    <rect x="900" y="180" width="32" height="640"/>
    <rect x="868" y="780" width="64" height="40"/>
  </g>
  <!-- Aqua rim-light on the severed edge — sells the cut as causal. -->
  <line x1="900" y1="380" x2="932" y2="380" stroke="#55FFFF" stroke-opacity="0.85" stroke-width="2.5"/>

  <!-- ── ONE confident [++] glyph inside the bubble, bottom-left.
       Reads as a chat-token in the message canvas, not a label. -->
  <g transform="translate(260 720)" filter="url(#gl)">
    <!-- horizontal stroke of first + -->
    <rect x="0"  y="40" width="40" height="16" rx="3" fill="url(#g)"/>
    <!-- vertical stroke of first + -->
    <rect x="12" y="16" width="16" height="64" rx="3" fill="url(#g)"/>
    <!-- horizontal stroke of second + -->
    <rect x="56" y="40" width="40" height="16" rx="3" fill="url(#g)"/>
    <!-- vertical stroke of second + -->
    <rect x="68" y="16" width="16" height="64" rx="3" fill="url(#g)"/>
  </g>
</svg>
