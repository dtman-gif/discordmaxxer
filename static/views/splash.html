<!doctype html>
<meta charset="utf-8" />

<head>
    <link rel="stylesheet" href="./common.css" type="text/css" />

    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; }
        body {
            background: none;
            user-select: none;
            -webkit-app-region: drag;
            overflow: hidden;
        }

        .wrapper {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            border: 1px solid var(--border-glow);
            background: linear-gradient(135deg, var(--bg-primary), var(--bg-tertiary));
            box-shadow: var(--shadow-glow);
            position: relative;
            overflow: hidden;
        }

        .logo-stage {
            width: 168px;
            height: 168px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Horned-Clyde mark with bullet-hole detail (v1). The PNG renders
           on its own cream background — we wrap it in a squircle to
           preserve the horns at the top edge instead of clipping to circle. */
        .dm-mark {
            width: 168px;
            height: 168px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 22px;
            overflow: hidden;
            filter: drop-shadow(0 8px 32px rgba(226, 91, 255, 0.45));
        }
        .dm-mark img {
            width: 168px;
            height: 168px;
            display: block;
            object-fit: contain;
        }

        .ripple {
            position: absolute;
            inset: 0;
            border-radius: 18px;
            border: 2px solid #e25bff;
            opacity: 0;
            pointer-events: none;
        }

        .wrapper p {
            text-align: center;
            margin: 0;
        }
        .wrapper p:nth-of-type(1) {
            color: var(--accent-primary);
            font-weight: 600;
            text-shadow: 0 0 10px var(--border-glow);
            margin-top: 18px;
        }
        .message {
            top: 70%;
            word-break: break-word;
            padding: 0 16px;
            position: absolute;
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Effect 1 — pulse */
        .effect-pulse .dm-mark { animation: dm-pulse 1.4s ease-in-out infinite; }
        @keyframes dm-pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 8px 32px rgba(76, 81, 247, 0.5)); }
            50%      { transform: scale(1.06); filter: drop-shadow(0 12px 48px rgba(226, 91, 255, 0.6)); }
        }

        /* Effect 2 — glow shift (was gradient-shift; the new logo has its
           gradient baked in, so we cycle the drop-shadow glow color instead) */
        .effect-gradient .dm-mark { animation: dm-glow 3s ease-in-out infinite; }
        @keyframes dm-glow {
            0%, 100% { filter: drop-shadow(0 8px 32px rgba(76, 81, 247, 0.5)); }
            33%      { filter: drop-shadow(0 8px 32px rgba(226, 91, 255, 0.55)); }
            66%      { filter: drop-shadow(0 8px 32px rgba(125, 81, 247, 0.55)); }
        }

        /* Effect 3 — spin-in entrance + slow rotate */
        .effect-spin .dm-mark {
            animation: dm-spin-in 0.8s cubic-bezier(0.2, 1.4, 0.4, 1) 0s 1, dm-spin-loop 8s linear 0.8s infinite;
        }
        @keyframes dm-spin-in {
            0%   { transform: rotate(-180deg) scale(0.4); opacity: 0; }
            100% { transform: rotate(0deg) scale(1); opacity: 1; }
        }
        @keyframes dm-spin-loop {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Effect 4 — ripple rings */
        .effect-ripple .ripple { animation: dm-ripple 1.8s ease-out infinite; }
        .effect-ripple .ripple:nth-child(2) { animation-delay: 0.6s; }
        .effect-ripple .ripple:nth-child(3) { animation-delay: 1.2s; }
        @keyframes dm-ripple {
            0%   { opacity: 0.7; transform: scale(0.8); border-width: 4px; }
            100% { opacity: 0; transform: scale(2.4); border-width: 1px; }
        }

        /* Effect 5 — flash + overshoot */
        .effect-flash .dm-mark {
            animation: dm-flash 0.6s cubic-bezier(0.2, 1.6, 0.4, 1) 0s 1 forwards;
        }
        @keyframes dm-flash {
            0%   { opacity: 0; transform: scale(0.2); filter: brightness(3) blur(8px); }
            60%  { opacity: 1; transform: scale(1.15); filter: brightness(1.4) blur(0); }
            100% { opacity: 1; transform: scale(1); filter: brightness(1) blur(0); }
        }

        /* Effect 6 — chidori (lightning halo flicker) */
        .effect-chidori .dm-mark { animation: dm-chidori 1.6s ease-in-out infinite; }
        @keyframes dm-chidori {
            0%, 100% { filter: drop-shadow(0 0 24px rgba(76,81,247,0.5)) drop-shadow(0 0 48px rgba(226,91,255,0.3)); }
            25%      { filter: drop-shadow(0 0 64px rgba(76,81,247,1)) drop-shadow(0 0 96px rgba(226,91,255,0.7)); }
            50%      { filter: drop-shadow(0 0 16px rgba(76,81,247,0.6)) drop-shadow(0 0 96px rgba(255,255,255,0.4)); }
            75%      { filter: drop-shadow(0 0 64px rgba(76,81,247,1)) drop-shadow(0 0 96px rgba(226,91,255,0.7)); }
        }

        /* Effect 7 — drift float */
        .effect-drift .dm-mark { animation: dm-drift 4s ease-in-out infinite; }
        @keyframes dm-drift {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33%      { transform: translateY(-6px) rotate(2deg); }
            66%      { transform: translateY(4px) rotate(-2deg); }
        }
    </style>
</head>

<body>
    <div class="wrapper" id="wrapper">
        <div class="logo-stage">
            <div class="ripple"></div>
            <div class="ripple"></div>
            <div class="ripple"></div>
            <div class="dm-mark">
                <img src="./dm-logo.png" alt="Discordmaxxer" />
            </div>
        </div>
        <p>Loading Discordmaxxer...</p>
        <p class="message"></p>
    </div>
</body>

<script>
    // Pick a random effect each launch — dropmaxxer-style variation.
    const EFFECTS = ["pulse", "gradient", "spin", "ripple", "flash", "chidori", "drift"];
    const pick = EFFECTS[Math.floor(Math.random() * EFFECTS.length)];
    document.getElementById("wrapper").classList.add("effect-" + pick);

    document.addEventListener("DOMContentLoaded", () => {
        const messageElement = document.querySelector(".message");
        VesktopSplashNative.onUpdateMessage(message => {
            messageElement.textContent = message;
        });
    });
</script>
