<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!--
    Direction B — "The Strip"
    Discord's speech-bubble silhouette with the bloat physically peeling off.
    Four ascending fading slices float off the top-right of the bubble; the
    remaining mass is brighter than baseline, has a glowing aqua cut-edge,
    and a gold [++] bracket sitting bottom-left where Discord's controller
    eye would be. Renders the headline marketing claim ("Discord. Minus
    753 MB.") literally — bloat visibly leaves the brand.
  -->
  <defs>
    <radialGradient id="bbg" cx="38%" cy="34%" r="78%">
      <stop offset="0%"   stop-color="#a3aeff"/>
      <stop offset="40%"  stop-color="#6f7cff"/>
      <stop offset="80%"  stop-color="#5865F2"/>
      <stop offset="100%" stop-color="#3b46d4"/>
    </radialGradient>
    <linearGradient id="bhi" x1="50%" y1="0%" x2="50%" y2="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bsh" x1="50%" y1="55%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="bcut" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#bff7ff"/>
      <stop offset="50%"  stop-color="#55FFFF"/>
      <stop offset="100%" stop-color="#16d6e6"/>
    </linearGradient>
    <linearGradient id="bgld" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFD64A"/>
      <stop offset="100%" stop-color="#FFAA00"/>
    </linearGradient>
    <filter id="bshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0a0a40" flood-opacity="0.55"/>
    </filter>
    <filter id="bglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bsliceglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="bclip">
      <path d="M 332 200
               L 688 200
               L 864 568
               A 168 168 0 0 1 696 736
               L 412 736
               L 308 832
               L 332 736
               L 296 736
               A 168 168 0 0 1 128 568
               L 128 368
               A 168 168 0 0 1 296 200 Z"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" fill="#0B0F1C"/>

  <!-- Suite-canon corner ticks: aqua top-left, gold bottom-right. -->
  <line x1="64"  y1="64"  x2="220" y2="64"  stroke="url(#bcut)" stroke-opacity="0.35" stroke-width="3"/>
  <line x1="64"  y1="64"  x2="64"  y2="220" stroke="url(#bcut)" stroke-opacity="0.35" stroke-width="3"/>
  <line x1="960" y1="960" x2="804" y2="960" stroke="url(#bgld)" stroke-opacity="0.35" stroke-width="3"/>
  <line x1="960" y1="960" x2="960" y2="804" stroke="url(#bgld)" stroke-opacity="0.35" stroke-width="3"/>

  <!-- Floating slices — bloat leaving. -->
  <g transform="rotate(-3 760 320)" filter="url(#bsliceglow)">
    <path d="M 700 280 L 870 280 L 902 320 L 700 320 Z" fill="url(#bbg)" opacity="0.78"/>
  </g>
  <g transform="rotate(-7 800 240) translate(40 -8)" filter="url(#bsliceglow)">
    <path d="M 720 220 L 870 220 L 894 248 L 720 248 Z" fill="url(#bbg)" opacity="0.55"/>
  </g>
  <g transform="rotate(-12 820 184) translate(80 -22)" filter="url(#bsliceglow)">
    <path d="M 750 168 L 858 168 L 876 188 L 750 188 Z" fill="url(#bbg)" opacity="0.35"/>
  </g>
  <g transform="rotate(-18 850 132) translate(120 -38)" filter="url(#bsliceglow)">
    <path d="M 776 122 L 848 122 L 860 138 L 776 138 Z" fill="url(#bbg)" opacity="0.20"/>
  </g>

  <!-- Bubble body. -->
  <g filter="url(#bshadow)">
    <path d="M 332 200
             L 688 200
             L 864 568
             A 168 168 0 0 1 696 736
             L 412 736
             L 308 832
             L 332 736
             L 296 736
             A 168 168 0 0 1 128 568
             L 128 368
             A 168 168 0 0 1 296 200 Z"
          fill="url(#bbg)"/>
  </g>
  <g clip-path="url(#bclip)">
    <rect x="0" y="0" width="1024" height="500" fill="url(#bhi)"/>
    <rect x="0" y="500" width="1024" height="500" fill="url(#bsh)"/>
  </g>

  <!-- Aqua cut-edge plasma. -->
  <g filter="url(#bglow)">
    <line x1="688" y1="200" x2="864" y2="568"
          stroke="url(#bcut)" stroke-width="20" stroke-linecap="round"/>
  </g>
  <line x1="688" y1="200" x2="864" y2="568"
        stroke="#e5fdff" stroke-width="4" stroke-linecap="round" stroke-opacity="0.9"/>

  <!-- Gold [++] bracket. -->
  <g transform="translate(255 540)" filter="url(#bglow)">
    <path d="M 0 0 L 24 0 L 24 14 L 14 14 L 14 86 L 24 86 L 24 100 L 0 100 Z" fill="url(#bgld)"/>
    <g transform="translate(36 18)">
      <rect x="14" y="0"  width="10" height="64" fill="url(#bgld)" rx="2"/>
      <rect x="0"  y="27" width="38" height="10" fill="url(#bgld)" rx="2"/>
      <rect x="62" y="0"  width="10" height="64" fill="url(#bgld)" rx="2"/>
      <rect x="48" y="27" width="38" height="10" fill="url(#bgld)" rx="2"/>
    </g>
    <path d="M 152 0 L 128 0 L 128 14 L 138 14 L 138 86 L 128 86 L 128 100 L 152 100 Z" fill="url(#bgld)"/>
  </g>
</svg>
