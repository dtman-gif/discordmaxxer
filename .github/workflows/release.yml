name: Release

# v0.1 = Windows-only per CLAUDE.md ("Mac/Linux defer to v0.2"). The previous
# matrix entries for macos-latest + ubuntu-latest are preserved in git history
# (revert this commit to restore them) and should come back when v0.2 ships.

on:
    push:
        tags:
            - v*
    workflow_dispatch:

# electron-builder --publish creates a GitHub release and uploads the
# installer + latest.yml; the default GITHUB_TOKEN only has contents=read
# on modern repos, so request contents=write explicitly here.
permissions:
    contents: write

jobs:
    release:
        runs-on: windows-latest

        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4 # Install pnpm using packageManager key in package.json

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # winaudio = our native WASAPI per-output-device loopback
            # module (packages/winaudio). pnpm install --frozen-lockfile
            # only symlinks the workspace package; the .node binary is
            # built via node-gyp in this step. Without this, the bundled
            # app would import winaudio at runtime + crash with "Cannot
            # find build/Release/winaudio.node".
            - name: Build winaudio native module
              run: pnpm buildWinAudio

            # Discordmaxxer ships a forked Vencord with 61 rebrand patches +
            # 11 custom plugins side-loaded into vencord-src/src/userplugins/.
            # The build pipeline (pnpm overlay:vencord) needs vencord-src to
            # exist on disk; it's gitignored and not in our repo, so clone it
            # here at the pinned tag. If you bump the pinned version, also
            # update the local vencord-src checkout so patches stay in sync.
            - name: Clone Vencord at pinned tag (v1.14.13)
              run: git clone --depth 1 --branch v1.14.13 https://github.com/Vendicated/Vencord.git vencord-src

            - name: Install Vencord deps
              working-directory: vencord-src
              run: pnpm install --frozen-lockfile

            # Applies overlay-scripts/rebrand-vencord.mjs (61 patches), syncs
            # plugins/* into vencord-src/src/userplugins/, builds Vencord, and
            # stages the 4 dist files at vencord-dist/ — which package.json's
            # extraResources[] copies into the packaged app at resources/
            # vencord-dist/.  Without this step the app falls back to
            # downloading stock unpatched Vencord at runtime — which is what
            # broke v0.1.0-rc1.
            - name: Apply rebrand + build Vencord overlay
              run: pnpm overlay:vencord

            - name: Build
              run: pnpm build

            - name: Run Electron Builder
              run: pnpm electron-builder --windows --publish always
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # ── Cross-repo: notify maxxtopia.com so the Download CTA on the
            # site picks up the new version. The listener workflow on the
            # other side rewrites src/data/discordmaxxer-release.json,
            # commits, and Cloudflare Pages auto-deploys the rebuild.
            #
            # Requires repo secret `MAXXTOPIA_DISPATCH_PAT` — a fine-grained
            # PAT with `Contents: Read and write` + `Metadata: Read` on the
            # `MaxxTopia/maxxtopia` repo (the default GITHUB_TOKEN is scoped
            # to this repo only and can't trigger workflows in another).
            #
            # If the secret is missing, the step skips gracefully so the
            # release itself still ships (the site just stays on whatever
            # version it had).
            - name: Notify maxxtopia of new release
              if: success() && startsWith(github.ref, 'refs/tags/v') && env.HAS_PAT == 'true'
              shell: bash
              env:
                  PAT: ${{ secrets.MAXXTOPIA_DISPATCH_PAT }}
                  HAS_PAT: ${{ secrets.MAXXTOPIA_DISPATCH_PAT != '' }}
              run: |
                  TAG="${GITHUB_REF_NAME}"
                  VERSION="${TAG#v}"
                  curl --fail-with-body -X POST \
                       -H "Accept: application/vnd.github+json" \
                       -H "Authorization: Bearer ${PAT}" \
                       -H "X-GitHub-Api-Version: 2022-11-28" \
                       https://api.github.com/repos/MaxxTopia/maxxtopia/dispatches \
                       -d "$(jq -n \
                           --arg version "${TAG}" \
                           --arg installerUrl "https://github.com/MaxxTopia/discordmaxxer/releases/download/${TAG}/Discordmaxxer-Setup-${VERSION}.exe" \
                           --arg releasePageUrl "https://github.com/MaxxTopia/discordmaxxer/releases/tag/${TAG}" \
                           '{event_type: "discordmaxxer-released", client_payload: {version: $version, installerUrl: $installerUrl, releasePageUrl: $releasePageUrl}}')"
