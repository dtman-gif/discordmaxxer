<!doctype html>
<html><head><meta charset="utf-8"/>
<style>
  body {
    background: #1e1f22; /* Discord dark base */
    color: #dcddde;
    font: 14px/1.4 -apple-system, "Segoe UI", system-ui, sans-serif;
    padding: 32px;
    margin: 0;
  }
  h2 { margin: 0 0 12px; font-size: 13px; color: #8e9297; text-transform: uppercase; letter-spacing: 0.5px; }
  .row { display: flex; gap: 24px; align-items: center; margin-bottom: 32px; padding: 16px; background: #2b2d31; border-radius: 8px; }
  /* Hub mark — copied from DiscordmaxxerHub plugin CSS */
  .dm-hub-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    margin-right: 8px;
    background: linear-gradient(135deg, #f37bff 0%, #a256fb 50%, #4c51f7 100%);
    border-radius: 5px;
    vertical-align: middle;
    cursor: help;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.18) inset;
  }
  .dm-hub-mark img { display: block; }
  .dm-hub-title {
    color: #fbefff;
    font-weight: 600;
    font-size: 16px;
    display: flex;
    align-items: center;
  }
  /* Badge — like Discord's profile-badge surface */
  .badge-row {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 8px;
    background: #313338;
    border-radius: 8px;
  }
  .badge-row img { width: 24px; height: 24px; display: block; }
  .light-bg { background: #f2f3f5; color: #060607; }
  .light-bg .badge-row { background: #ffffff; box-shadow: 0 1px 0 rgba(0,0,0,0.06); }
  .scale-row { display: flex; gap: 16px; align-items: end; }
  .scale-row figure { margin: 0; text-align: center; }
  .scale-row figcaption { font-size: 11px; color: #8e9297; margin-top: 4px; }
</style></head>
